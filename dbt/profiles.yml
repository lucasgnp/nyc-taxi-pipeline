nyc_taxi:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DW_POSTGRES_HOST', 'postgres-dw') }}"
      port: "{{ env_var('DW_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('DW_POSTGRES_USER', 'taxi') }}"
      password: "{{ env_var('DW_POSTGRES_PASSWORD', 'taxi') }}"
      dbname: "{{ env_var('DW_POSTGRES_DB', 'nyc_taxi') }}"
      schema: gold
      threads: 4